# Throwaway Postgres for testing the Helm chart against a local kind cluster.
# The chart itself never creates a database (production uses RDS) — this
# manifest exists only to give kind something to point DATABASE_URL at.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: calendar
            - name: POSTGRES_PASSWORD
              value: calendar
            - name: POSTGRES_DB
              value: calendar
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "calendar"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: calendar-db-credentials
type: Opaque
stringData:
  DATABASE_URL: postgres://calendar:calendar@postgres:5432/calendar
