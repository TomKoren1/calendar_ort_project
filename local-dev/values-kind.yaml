# Overrides for testing the chart against a local kind cluster.
backend:
  image:
    repository: calendar-backend
    tag: local
    pullPolicy: IfNotPresent
  replicaCount: 1
  # kind has no ingress controller installed; reach the app via port-forward instead.
  ingress:
    enabled: false
  # kind has no metrics-server installed - HPA would just show <unknown> forever.
  autoscaling:
    enabled: false

frontend:
  image:
    repository: calendar-frontend
    tag: local
    pullPolicy: IfNotPresent
  replicaCount: 1
  ingress:
    enabled: false
  autoscaling:
    enabled: false
