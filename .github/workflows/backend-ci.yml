name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/build-and-push.yml"
      - ".github/actions/setup-workspace/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/build-and-push.yml"
      - ".github/actions/setup-workspace/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: calendar
          POSTGRES_PASSWORD: calendar
          POSTGRES_DB: calendar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calendar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://calendar:calendar@localhost:5432/calendar
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-workspace

      - name: Run migrations
        working-directory: backend
        run: npm run migrate:up

      - name: Run tests
        working-directory: backend
        run: npm test

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: calendar-backend
      dockerfile: backend/Dockerfile
      chart-values-path: helm/calendar/charts/backend/values.yaml
      commit-scope: backend
