name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/build-and-push.yml"
      - ".github/actions/setup-workspace/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/build-and-push.yml"
      - ".github/actions/setup-workspace/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-workspace

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  build-and-push:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: calendar-frontend
      dockerfile: frontend/Dockerfile
      chart-values-path: helm/calendar/charts/frontend/values.yaml
      commit-scope: frontend
