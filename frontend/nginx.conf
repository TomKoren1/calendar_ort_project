server {
  listen 80;

  # /api/* is routed straight to the backend Service by the Ingress
  # controller (see helm/calendar/charts/backend/templates/ingress.yaml) -
  # this container no longer proxies it. Only ever serves static assets +
  # the SPA fallback.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }
}
