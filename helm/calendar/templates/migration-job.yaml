{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # name includes the release revision so each upgrade gets a fresh Job
  # (k8s Jobs are immutable once created)
  name: {{ include "calendar.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      {{- with .Values.backend.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          # Same image as the backend Deployment — it already carries
          # node-pg-migrate and the migrations/ folder, so there's a single
          # source of truth for schema changes instead of a separate copy.
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["npm", "run", "migrate:up"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret }}
                  key: {{ .Values.backend.existingSecretKey }}
{{- end }}
