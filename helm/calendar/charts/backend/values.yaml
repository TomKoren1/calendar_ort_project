# Default values for the backend subchart. Not designed for standalone
# install - only ever deployed via the parent calendar umbrella chart, which
# is what supplies existingSecret/ingress/etc context.

image:
  repository: <account-id>.dkr.ecr.<region>.amazonaws.com/calendar-backend
  tag: 96cfecfc89483c70aa2edeefe654b7c782d0bf50
  pullPolicy: IfNotPresent
# Empty by default (public/no-registry-auth images). Set when pulling from a
# private registry the node has no other credentials for - e.g. ECR from a
# kind cluster with no IAM identity of its own (see local-dev/README or
# workplan.txt Step 3 for how the Secret this references gets created).
imagePullSecrets: []
replicaCount: 2
containerPort: 3001
service:
  port: 3001
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
probes:
  path: /api/health
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
# Shared className/host/TLS live in the parent chart's global.ingress (both
# subcharts must agree on those) - this is just this subchart's own on/off
# switch.
ingress:
  enabled: true
# Requires the metrics-server EKS addon (infra/modules/eks-cluster/eks.tf) - disabled for
# local-dev/values-kind*.yaml, which has no metrics-server installed.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
env:
  PORT: "3001"
# Secret must already exist in the cluster (created by hand, Terraform, or
# External Secrets Operator syncing from AWS Secrets Manager) and contain
# a key named DATABASE_URL. This chart does not create it.
existingSecret: calendar-db-credentials
existingSecretKey: DATABASE_URL
