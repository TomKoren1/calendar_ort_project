apiVersion: v1
kind: Service
metadata:
  name: {{ include "calendar.backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
