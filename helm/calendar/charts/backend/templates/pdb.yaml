{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "calendar.backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  # maxUnavailable (not minAvailable) deliberately - minAvailable:1 would
  # block ALL voluntary eviction (Karpenter consolidation, node drain) when
  # replicaCount is 1, as it is in local-dev/values-kind*.yaml. maxUnavailable:1
  # behaves correctly at any replica count: allows evicting the only pod when
  # there's just one, but still only one at a time when there are several.
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: backend
{{- end }}
