# Default values for the frontend subchart. Not designed for standalone
# install - only ever deployed via the parent calendar umbrella chart.

image:
  repository: <account-id>.dkr.ecr.<region>.amazonaws.com/calendar-frontend
  tag: 96cfecfc89483c70aa2edeefe654b7c782d0bf50
  pullPolicy: IfNotPresent
# Empty by default (public/no-registry-auth images). Set when pulling from a
# private registry the node has no other credentials for - see backend's
# values.yaml for the full explanation.
imagePullSecrets: []
replicaCount: 2
containerPort: 80
service:
  port: 80
resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
# See backend/values.yaml's comment - shared ingress config lives in the
# parent chart's global.ingress; this is just this subchart's on/off switch.
ingress:
  enabled: true
# See backend/values.yaml's comment - same metrics-server dependency.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
