apiVersion: v1
kind: Service
metadata:
  name: {{ include "calendar.frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
